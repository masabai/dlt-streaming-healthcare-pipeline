version: 2

sources:
  - name: dbt_patients
    database: patients_governance
    schema: bronze

    tables:

      # =========================
      # 1: patients
      # =========================
      - name: patients
        description: "Core patient identity table (PII-sensitive)."
        columns:
          - name: Id
            tests:
              - not_null
              - unique

          - name: BIRTHDATE
            description: "PII: patient birth date"
            tests:
              - not_null

          - name: DEATHDATE
            description: "Sensitive medical attribute"

      # =========================
      # 2: encounters
      # =========================
      - name: encounters
        description: "Clinical encounter events per patient."
        columns:
          - name: Id
            tests:
              - not_null
              - unique

          - name: START
            tests:
              - not_null

          - name: STOP
            tests:
              - not_null

      # =========================
      # 3: claims
      # =========================
      - name: claims
        description: "Insurance claims and billing transactions."
        columns:
          - name: Id
            tests:
              - not_null

          - name: PATIENTID
            tests:
              - not_null

          - name: PROVIDERID
            tests:
              - not_null

      # =========================
      # 4: allergies
      # =========================
      - name: allergies
        description: "Patient allergy records from clinical system."
        columns:
          - name: PATIENT
            tests:
              - not_null

      # =========================
      # 5: conditions
      # =========================
      - name: conditions
        description: "Condition recorded for the patient encounter."
        columns:
          - name: PATIENT
            tests:
              - not_null

      # =========================
      # 6: medications
      # =========================
      - name: medications
        description: "Medical condition recorded for the patient encounter."
        columns:
          - name: PATIENT
            tests:
              - not_null

      # =========================
      # 7: observations
      # =========================
      - name: observations
        description: "Observation recorded for the patient encounter."
        columns:
          - name: PATIENT
            tests:
              - not_null



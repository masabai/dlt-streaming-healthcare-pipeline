version: 2

sources:
  - name: dbt_patients
    database: patients_governance
    schema: bronze

    tables:

      # =========================
      # 1: patients
      # =========================
      - name: patients
        description: "Core patient identity table (PII-sensitive)."
        columns:
          - name: Id
            tests:
              - not_null
              - unique

          - name: BIRTHDATE
            description: "PII: patient birth date"
            tests:
              - not_null

          - name: DEATHDATE
            description: "Sensitive medical attribute"

      # =========================
      # 2: encounters
      # =========================
      - name: encounters
        description: "Clinical encounter events per patient."
        columns:
          - name: Id
            tests:
              - not_null
              - unique

          - name: START
            tests:
              - not_null

          - name: STOP
            tests:
              - not_null

      # =========================
      # 3: claims
      # =========================
      - name: claims
        description: "Insurance claims and billing transactions."
        columns:
          - name: Id
            tests:
              - not_null
              - unique

          - name: PATIENTID
            tests:
              - not_null

          - name: PROVIDERID
            tests:
              - not_null

      # =========================
      # KEEP (DO NOT BREAK MODELS)
      # =========================
      - name: allergies
        description: "Raw healthcare data for allergies"

      - name: careplans
        description: "Raw healthcare data for careplans"

      - name: claims_transactions
        description: "Raw healthcare data for claims_transactions"

      - name: conditions
        description: "Raw healthcare data for conditions"

      - name: devices
        description: "Raw healthcare data for devices"

      - name: imaging_studies
        description: "Raw healthcare data for imaging_studies"

      - name: immunizations
        description: "Raw healthcare data for immunizations"

      - name: medications
        description: "Raw healthcare data for medications"

      - name: observations
        description: "Raw healthcare data for observations"

      - name: organizations
        description: "Raw healthcare data for organizations"

      - name: payer_transitions
        description: "Raw healthcare data for payer_transitions"

      - name: payers
        description: "Raw healthcare data for payers"

      - name: procedures
        description: "Raw healthcare data for procedures"

      - name: providers
        description: "Raw healthcare data for providers"

      - name: supplies
        description: "Raw healthcare data for supplies"